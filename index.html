<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物理·数学情景实验室</title>
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
        }
        h1 { color: #1e3c72; border-left: 5px solid #0a58ca; padding-left: 20px; }
        .category { background: white; border-radius: 16px; padding: 1rem 1.5rem; margin: 1.5rem 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { color: #2c3e66; margin-top: 0; }
        ul { list-style: none; padding-left: 0; }
        li { margin: 0.8rem 0; padding: 8px 12px; background: #f8f9fa; border-radius: 12px; transition: 0.2s; }
        li:hover { background: #e9ecef; transform: translateX(5px); }
        a { text-decoration: none; font-size: 1.1rem; color: #0a58ca; font-weight: 500; display: block; }
        a small { color: #6c757d; font-weight: normal; font-size: 0.85rem; display: block; margin-top: 4px; }
        footer { text-align: center; margin-top: 2rem; color: #6c757d; font-size: 0.85rem; border-top: 1px solid #ccc; padding-top: 1rem; }
    </style>
</head>
<body>
    <h1>🧪 物理 · 数学情景实验室</h1>
    <footer>
        ✨ 每个情景均为独立 HTML — 自由编辑 / 嵌入 Canvas 或 Three.js 模拟
    </footer>
</body>
</html>
